version: '3.8'

services:
  rag-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-research-assistant
    ports:
      - "7860:7860"
    volumes:
      # Persist vector store
      - ./vectorstore:/app/vectorstore
      # Persist model cache
      - ./models:/app/models
      # Mount your PDFs
      - ./data:/app/data
    environment:
      - ANONYMIZED_TELEMETRY=False
      - CHROMA_TELEMETRY=False
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
